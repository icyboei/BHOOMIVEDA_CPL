<!-- ============================================================
     AI ASSISTANT — floating green chat button (bottom-right).
     Click to open a small chat panel.
     ============================================================ -->
<div class="fixed bottom-6 right-6 z-50">
  <div id="bv-ai-panel" class="hidden absolute bottom-16 right-0 w-80 rounded-2xl shadow-2xl overflow-hidden bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700">
    <!-- Header -->
    <div class="bg-gradient-to-r from-green-700 to-green-500 p-4 flex items-center gap-3">
      <div class="h-8 w-8 overflow-hidden rounded-lg bg-white/20 flex-shrink-0">
        <img src="../assets/bhoomiveda-logo.png" alt="" aria-hidden="true" class="w-full h-[200%] object-contain object-top" />
      </div>
      <div>
        <div class="text-white font-bold text-sm">BhoomiVeda</div>
        <div class="text-green-200 text-xs">Always here to help</div>
      </div>
      <button id="bv-ai-close" class="ml-auto text-white opacity-70 hover:opacity-100"><i data-lucide="x"></i></button>
    </div>

    <!-- Messages -->
    <div id="bv-ai-messages" class="h-48 overflow-y-auto p-4 space-y-3"></div>

    <!-- Input -->
    <div class="flex gap-2 p-3 border-t border-gray-100 dark:border-gray-700">
      <input id="bv-ai-input" placeholder="Ask anything about farming..."
             class="flex-1 text-xs outline-none bg-transparent text-gray-800 dark:text-white placeholder-gray-400 dark:placeholder-gray-500" />
      <button id="bv-ai-send" class="p-1.5 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors">
        <i data-lucide="send" style="width:12px;height:12px"></i>
      </button>
    </div>
  </div>

  <button id="bv-ai-toggle"
          class="w-12 h-12 rounded-2xl bg-gradient-to-br from-green-600 to-green-500 text-white shadow-lg shadow-green-500/30 flex items-center justify-center hover:scale-105 transition-transform">
    <i data-lucide="bot" style="width:22px;height:22px"></i>
  </button>
</div>
