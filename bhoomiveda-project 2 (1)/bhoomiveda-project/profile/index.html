<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Profile — BhoomiVeda</title>
  <link rel="icon" href="../assets/favicon.svg" />
  <script src="../shared/tailwind-config.js"></script>
  <script src="../shared/auth.js"></script>
  <script src="../shared/language.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <link rel="stylesheet" href="../shared/shell.css" />
  <link rel="stylesheet" href="../shared/theme.css" />
  <link rel="stylesheet" href="../sidebar/sidebar.css" />
  <link rel="stylesheet" href="../navbar/navbar.css" />
  <link rel="stylesheet" href="../ai-assistant/ai-assistant.css" />
  <link rel="stylesheet" href="profile.css" />
</head>
<body data-protected="true" data-page="profile" data-page-title="My Profile" data-page-title-key="profile" class="bg-gray-50 dark:bg-gray-950">
<div class="flex h-screen overflow-hidden">
  <div data-include="../sidebar/sidebar.html" class="hidden md:flex"></div>
  <div class="flex-1 flex flex-col overflow-hidden">
    <div class="flex items-center md:hidden px-4 py-3 border-b bg-white dark:bg-gray-900 border-gray-100 dark:border-gray-800">
      <button class="p-2 rounded-lg"><i data-lucide="menu"></i></button>
      <div class="flex items-center gap-2.5 ml-2 min-w-0">
        <div class="h-8 w-8 overflow-hidden flex-shrink-0">
          <img src="../assets/bhoomiveda-logo.png" alt="" class="w-full h-[200%] max-w-none object-contain object-top" />
        </div>
        <span class="font-extrabold uppercase tracking-[0.14em] leading-none text-xs text-gray-900 dark:text-white">
          Bhoomi<span class="text-green-600">Veda</span>
        </span>
      </div>
    </div>
    <div data-include="../navbar/navbar.html"></div>
    <main class="flex-1 overflow-y-auto">
<div class="bg-gray-50 dark:bg-gray-900 min-h-screen p-6">
  <div class="max-w-4xl mx-auto">

    <!-- Profile hero -->
    <div class="bg-gradient-to-r from-green-700 to-green-500 rounded-3xl p-8 text-white mb-6 relative overflow-hidden shadow-xl">
      <div class="absolute right-6 top-6 text-7xl opacity-10 select-none">👨‍🌾</div>
      <div class="flex flex-col sm:flex-row items-start sm:items-center gap-6">
        <button id="bv-photo-btn" type="button" title="Change profile photo"
          class="relative w-20 h-20 rounded-2xl bg-white bg-opacity-20 flex items-center justify-center text-3xl font-black border-2 border-white border-opacity-40 overflow-hidden cursor-pointer group">
          <span id="bv-avatar-initials">K</span>
          <img id="bv-avatar-img" alt="" class="hidden absolute inset-0 w-full h-full object-cover" />
          <span class="absolute inset-0 bg-black bg-opacity-40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center text-xs font-semibold">
            <i data-lucide="camera" style="width:18px;height:18px"></i>
          </span>
        </button>
        <input id="bv-photo-input" type="file" accept="image/jpeg,image/jpg,image/png,image/webp" class="hidden" />

        <div class="flex-1 min-w-0">
          <h2 id="bv-fullname" class="text-2xl font-black truncate">Kisan</h2>
          <p class="text-green-100 text-sm mt-0.5 flex items-center gap-1">
            <i data-lucide="map-pin" style="width:13px;height:13px"></i>
            <span id="bv-location">—</span>
          </p>
          <div class="flex gap-4 mt-3 text-sm flex-wrap">
            <span class="flex items-center gap-1 opacity-80">🌾 <span id="bv-landsize">—</span></span>
            <span class="flex items-center gap-1 opacity-80">📅 <span id="bv-since">—</span></span>
            <span class="flex items-center gap-1 opacity-80">⭐ <span id="bv-points">0</span> <span data-i18n="pts">pts</span></span>
          </div>
        </div>
        <button id="bv-edit-open" class="bg-white bg-opacity-20 border border-white border-opacity-30 text-white px-4 py-2 rounded-xl text-sm font-semibold hover:bg-opacity-30 transition-colors flex items-center gap-2">
          <i data-lucide="edit" style="width:14px;height:14px"></i><span data-i18n="editProfile">Edit Profile</span>
        </button>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- Personal & Farm Details -->
      <div class="bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-2xl p-5 shadow-sm">
        <h3 class="font-bold text-gray-900 dark:text-white mb-4 flex items-center gap-2"><i data-lucide="user" class="text-green-600" style="width:16px;height:16px"></i><span data-i18n="profileDetails">Profile Details</span></h3>
        <div class="space-y-3" id="bv-farm"></div>
      </div>

      <!-- Productivity -->
      <div class="bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-2xl p-5 shadow-sm">
        <h3 class="font-bold text-gray-900 dark:text-white mb-4 flex items-center gap-2"><i data-lucide="bar-chart-2" class="text-green-600" style="width:16px;height:16px"></i><span data-i18n="productivityStats">Productivity Stats</span></h3>
        <div class="grid grid-cols-2 gap-3 mb-4" id="bv-stats"></div>
        <div style="height:100px"><canvas id="bv-profile-chart"></canvas></div>
      </div>

      <!-- Achievements -->
      <div class="bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-2xl p-5 shadow-sm">
        <h3 class="font-bold text-gray-900 dark:text-white mb-4 flex items-center gap-2"><i data-lucide="award" class="text-yellow-500" style="width:16px;height:16px"></i><span data-i18n="achievements">Achievements</span></h3>
        <div class="grid grid-cols-3 gap-2" id="bv-badges"></div>
      </div>
    </div>
  </div>

  <!-- Edit modal -->
  <div id="bv-edit-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
    <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 w-full max-w-md shadow-2xl max-h-[90vh] overflow-y-auto" id="bv-edit-card">
      <div class="flex items-center justify-between mb-5">
        <h3 class="font-bold text-lg text-gray-900 dark:text-white" data-i18n="editProfileTitle">Edit Profile</h3>
        <button id="bv-edit-close" class="p-1.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-500 dark:text-gray-400 transition-colors"><i data-lucide="x" style="width:18px;height:18px"></i></button>
      </div>
      <div class="space-y-4" id="bv-edit-fields"></div>
      <div class="flex gap-3 mt-5">
        <button id="bv-edit-cancel" data-i18n="cancel" class="flex-1 py-2.5 rounded-xl text-sm font-semibold border border-gray-200 dark:border-gray-600 text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">Cancel</button>
        <button id="bv-edit-save" data-i18n="saveChanges"   class="flex-1 py-2.5 rounded-xl text-sm font-bold bg-green-600 text-white hover:bg-green-700 transition-colors">Save Changes</button>
      </div>
    </div>
  </div>
</div>
    </main>
  </div>
  <div data-include="../ai-assistant/ai-assistant.html"></div>
</div>
<script src="../shared/data.js"></script>
<script src="../shared/shell.js"></script>
<script src="../sidebar/sidebar.js"></script>
<script src="../navbar/navbar.js"></script>
<script src="../ai-assistant/ai-assistant.js"></script>
<script src="profile.js"></script>
</body>
</html>
